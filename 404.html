<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found — The Cozy Cup</title>
  <meta name="description" content="Oops! The page you are looking for does not exist." />
  <link rel="icon" type="image/webp" href="images/logo.webp" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      font-family: var(--font-body);
    }
    
    .navbar {
      position: absolute;
      top: 0;
      width: 100%;
      z-index: 100;
    }

    .not-found-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 10;
      pointer-events: none; /* Let clicks pass through to canvas if needed, except for button */
    }

    .not-found-content {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.4);
      padding: 3rem;
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transform: translateY(20px);
      opacity: 0;
      animation: fadeUpIn 0.8s var(--ease-bounce) forwards;
    }

    @keyframes fadeUpIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: 8rem;
      font-weight: 800;
      color: var(--espresso);
      line-height: 1;
      margin: 0;
      text-shadow: 4px 4px 0px rgba(201, 169, 110, 0.3);
    }

    .error-msg {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .error-desc {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      max-width: 400px;
    }

    .back-btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: var(--gold);
      color: white;
      text-decoration: none;
      font-weight: 600;
      border-radius: 50px;
      transition: all var(--transition-normal);
      box-shadow: 0 10px 20px rgba(201, 169, 110, 0.3);
    }

    .back-btn:hover {
      background: var(--espresso);
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(62, 39, 35, 0.3);
    }

    /* Canvas for interactive beans */
    #coffeeCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: auto;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">
        <img src="images/logo.webp" alt="The Cozy Cup Cafe Logo" />
        <span class="navbar-logo-text">The Cozy Cup</span>
      </a>
      <div class="nav-links">
        <a href="index.html">Back to Home</a>
      </div>
    </div>
  </nav>

  <!-- INTERACTIVE CANVAS -->
  <canvas id="coffeeCanvas"></canvas>

  <!-- 404 CONTENT -->
  <div class="not-found-container">
    <div class="not-found-content">
      <h1 class="error-code">404</h1>
      <div class="error-msg">Oops! Coffee Spilled.</div>
      <p class="error-desc">We couldn't find the page you were looking for. It might have been moved or doesn't exist.</p>
      <a href="index.html" class="back-btn">Brew a New Cup (Home)</a>
    </div>
  </div>

  <script>
    // --- Interactive Floating Coffee Beans ---
    const canvas = document.getElementById('coffeeCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let beans = [];
    const numBeans = 40;

    // Coffee bean colors
    const colors = ['#3E2723', '#4E342E', '#5D4037', '#A67B5B'];

    let mouse = { x: null, y: null, radius: 150 };

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.x;
      mouse.y = e.y;
    });

    window.addEventListener('resize', init);

    class CoffeeBean {
      constructor(x, y, size, color) {
        this.x = x;
        this.y = y;
        this.baseX = x;
        this.baseY = y;
        this.size = size;
        this.color = color;
        this.density = (Math.random() * 30) + 1;
        this.angle = Math.random() * Math.PI * 2;
        this.spinSpeed = (Math.random() - 0.5) * 0.05;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        ctx.fillStyle = this.color;
        ctx.beginPath();
        // Drawing a coffee bean shape (oval with a curve in the middle)
        ctx.ellipse(0, 0, this.size, this.size * 1.4, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // The bean crack
        ctx.strokeStyle = '#2d1b15';
        ctx.lineWidth = this.size * 0.15;
        ctx.beginPath();
        ctx.moveTo(0, -this.size);
        ctx.quadraticCurveTo(-this.size*0.5, 0, 0, this.size);
        ctx.stroke();

        ctx.restore();
      }

      update() {
        // Float slowly
        this.angle += this.spinSpeed;
        this.baseY -= 0.5; // Float upwards naturally
        if (this.baseY < -50) {
          this.baseY = height + 50;
          this.baseX = Math.random() * width;
        }

        // Mouse interaction
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        let forceDirectionX = dx / distance;
        let forceDirectionY = dy / distance;

        // Force drops off with distance
        let force = (mouse.radius - distance) / mouse.radius;
        if (force < 0) force = 0;

        let directionX = (forceDirectionX * force * this.density) * -1;
        let directionY = (forceDirectionY * force * this.density) * -1;

        if (distance < mouse.radius) {
          this.x += directionX;
          this.y += directionY;
        } else {
          // Return to base position
          if (this.x !== this.baseX) {
            let dx = this.x - this.baseX;
            this.x -= dx / 10;
          }
          if (this.y !== this.baseY) {
            let dy = this.y - this.baseY;
            this.y -= dy / 10;
          }
        }

        this.draw();
      }
    }

    function init() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      beans = [];
      for (let i = 0; i < numBeans; i++) {
        let size = (Math.random() * 8) + 6;
        let x = Math.random() * width;
        let y = Math.random() * height;
        let color = colors[Math.floor(Math.random() * colors.length)];
        beans.push(new CoffeeBean(x, y, size, color));
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      for (let i = 0; i < beans.length; i++) {
        beans[i].update();
      }
      requestAnimationFrame(animate);
    }

    init();
    animate();

    // Reset mouse when it leaves screen
    window.addEventListener('mouseout', () => {
      mouse.x = undefined;
      mouse.y = undefined;
    });
  </script>
</body>

</html>
